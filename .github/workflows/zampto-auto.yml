name: Zampto Auto

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:

jobs:
  run-zampto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 修改点 1：添加 [socks] 以支持 SOCKS5 代理
          pip install "requests[socks]" beautifulsoup4

      - name: 下载并启动 Xray 代理
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          curl -sL https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          # 修改点 2：添加 -o 参数强制覆盖已存在的文件（如 README.md），避免交互卡住
          unzip -o -q xray.zip && chmod +x xray
          echo "$V2RAY_CONFIG" > config.json
          ./xray run -c config.json &
          sleep 5
          echo "直连 IP：$(curl -s --max-time 5 ifconfig.me || echo '失败')"
          echo "代理 IP：$(curl -s --max-time 10 --socks5 127.0.0.1:1080 ifconfig.me || echo '代理失败，请检查 V2RAY_CONFIG')"

      - name: Run Zampto Auto Script
        env:
          ZAMPTO_USERNAME: ${{ secrets.ZAMPTO_USERNAME }}
          ZAMPTO_PASSWORD: ${{ secrets.ZAMPTO_PASSWORD }}
          ZAMPTO_SERVER_ID: ${{ secrets.ZAMPTO_SERVER_ID }}
          WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: |
          python zampto_auto.py
